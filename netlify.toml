[build]
  # Explicitly telling it to install dependencies first, then build
  command = "npm install && npm run build"
  publish = "dist"

# Handles the React Router SPA issue
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm install && npm run build"

[context.deploy-preview]
  command = "npm install && npm run build"